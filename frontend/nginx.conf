server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Angular router: unknown paths fall back to index.html, not 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Angular builds content-hashed filenames so assets can be cached forever.
    location ~* \.(js|css|woff|woff2|png|jpg|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
